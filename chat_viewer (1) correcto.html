async function decompress(b64) {
  const bin = atob(b64);
  const bytes = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
  const ds = new DecompressionStream('gzip');
  const w = ds.writable.getWriter();
  w.write(bytes); w.close();
  const chunks = [];
  const reader = ds.readable.getReader();
  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    chunks.push(value);
  }
  const total = chunks.reduce((a, b) => a + b.length, 0);
  const out = new Uint8Array(total);
  let offset = 0;
  for (const c of chunks) { out.set(c, offset); offset += c.length; }
  return new TextDecoder().decode(out);
}

function formatDate(ds) {
  const [y, m, d] = ds.split('-');
  const months = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  const days = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
  const dt = new Date(+y, +m-1, +d);
  return `${days[dt.getDay()]} ${+d} ${months[+m-1]} ${y}`;
}

function formatFullDate(dt) {
  // dt = "2025-07-18 06:19:18"
  const [datePart, timePart] = dt.split(' ');
  const [y, m, d] = datePart.split('-');
  const months = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  const days = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
  const dateObj = new Date(+y, +m-1, +d);
  const time = timePart.slice(0,5);
  return `${days[dateObj.getDay()]} ${+d} ${months[+m-1]} · ${time}`;
}

function esc(t) {
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function highlight(text, q) {
  if (!q) return esc(text);
  const safe = q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return esc(text).replace(new RegExp(safe, 'gi'), m => `<mark>${m}</mark>`);
}

function render(msgs, query) {
  const chat = document.getElementById('chat');
  const empty = document.getElementById('empty');

  if (msgs.length === 0) {
    chat.innerHTML = '';
    chat.appendChild(empty);
    empty.style.display = 'block';
    document.getElementById('msg-count').textContent = '0 resultados';
    return;
  }
  empty.style.display = 'none';
  document.getElementById('msg-count').textContent = query ? `${msgs.length} resultados` : `${msgs.length} msgs`;

  let html = '';
  let lastDate = '';
  let i = 0;

  while (i < msgs.length) {
    const m = msgs[i];
    const dateKey = m[0].slice(0, 10);
    const isMe = m[1] === 1;
    const side = isMe ? 'me' : 'them';
    const label = isMe ? 'Yo' : '+14803323886';

    if (dateKey !== lastDate) {
      html += `<div class="date-div"><span>${formatDate(dateKey)}</span></div>`;
      lastDate = dateKey;
    }

    // Group consecutive same-sender messages on same date
    const group = [];
    while (i < msgs.length && msgs[i][1] === m[1] && msgs[i][0].slice(0,10) === dateKey) {
      group.push(msgs[i]);
      i++;
    }

    html += `<div class="group ${side}">`;
    html += `<div class="sender">${label}</div>`;
    for (const gm of group) {
      html += `<div class="msg-wrap">`;
      html += `<div class="msg-timestamp">${formatFullDate(gm[0])}</div>`;
      html += `<div class="bubble">${highlight(gm[2], query)}</div>`;
      html += `</div>`;
    }
    html += `</div>`;
  }

  chat.innerHTML = html;
  if (!query) chat.scrollTop = chat.scrollHeight;
}

function onSearch(val) {
  clearTimeout(searchTimeout);
  searchTimeout = setTimeout(() => {
    const q = val.trim().toLowerCase();
    if (!q) { render(ALL_MSGS, ''); return; }
    const results = ALL_MSGS.filter(m => m[2].toLowerCase().includes(q));
    render(results, val.trim());
  }, 300);
}

async function init() {
  const json = await decompress(B64);
  const data = JSON.parse(json);
  ALL_MSGS = data.msgs;
  render(ALL_MSGS, '');
}

init();
</script>
</body>
</html>
